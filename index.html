<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sumas API </title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Sumas API</h1>
            <p id="welcome-msg">Cargando...</p>
        </header>

        <main>
            <div class="card">
                <h2>Calculadora de Suma</h2>
                <form id="sum-form">
                    <div class="input-group">
                        <label for="num1">Número 1</label>
                        <input type="number" id="num1" step="any" required placeholder="Ingresa el primer número">
                    </div>
                    <div class="input-group">
                        <label for="num2">Número 2</label>
                        <input type="number" id="num2" step="any" required placeholder="Ingresa el segundo número">
                    </div>
                    <button type="submit">Sumar</button>
                </form>

                <div id="result" class="result hidden">
                    <span>Resultado:</span>
                    <strong id="result-value"></strong>
                </div>

                <div id="error" class="error hidden"></div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
